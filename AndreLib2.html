<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AdreLib - Library Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="dark-theme min-h-screen font-sans">
    <!-- LOGIN PAGE (same as before) -->
    <div id="login-page" class="flex items-center justify-center min-h-screen bg-gradient-to-br from-slate-900 via-slate-800 to-sky-950">
        <!-- ... (keep your current login page code) ... -->
    </div>

    <!-- STUDENT REGISTRATION MODAL (same) -->
    <!-- ... -->

    <!-- MAIN APP -->
    <div id="main-app" class="hidden">
        <nav class="bg-slate-900 border-b border-slate-700 sticky top-0 z-50">
            <div class="max-w-screen-2xl mx-auto px-8 py-4 flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <div class="w-9 h-9 bg-sky-500 rounded-2xl flex items-center justify-center text-white text-2xl">📖</div>
                    <span class="font-bold text-2xl tracking-tighter">AdreLib</span>
                </div>
                <div class="flex items-center gap-6">
                    <div id="user-info" class="text-right text-sm"></div>
                    <button onclick="logout()" class="px-6 py-2.5 bg-slate-800 hover:bg-red-500/10 hover:text-red-400 rounded-2xl transition-colors">
                        Logout
                    </button>
                </div>
            </div>
        </nav>

        <div class="max-w-screen-2xl mx-auto px-8 py-8">
            <!-- Director Dashboard -->
            <div id="director-dashboard">
                <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-10">
                    <!-- Stats cards -->
                    <div class="bg-slate-800 rounded-3xl p-6">
                        <p class="text-slate-400">Total Students</p>
                        <p id="stat-students" class="text-5xl font-bold">0</p>
                    </div>
                    <!-- Add other stats if needed -->
                </div>
                <div id="director-content">
                    <!-- Populated by JS -->
                </div>
            </div>

            <!-- Student Dashboard -->
            <div id="student-dashboard" class="hidden">
                <!-- Your student view -->
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
