<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AdreLib - Library Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="dark-theme min-h-screen font-sans">
    <!-- LOGIN PAGE -->
    <div id="login-page" class="flex items-center justify-center min-h-screen bg-gradient-to-br from-slate-900 via-slate-800 to-sky-950">
        <div class="max-w-md w-full mx-4">
            <div class="text-center mb-10">
                <div class="inline-flex items-center justify-center w-20 h-20 bg-sky-500 text-white rounded-2xl text-4xl mb-4 shadow-lg">📚</div>
                <h1 class="text-5xl font-bold tracking-tight text-white">AdreLib</h1>
                <p class="text-slate-400 mt-2">Advanced Library System</p>
            </div>
            
            <div class="bg-slate-800/70 backdrop-blur-xl rounded-3xl p-8 shadow-2xl border border-slate-700">
                <div class="flex mb-6 border-b border-slate-700">
                    <button onclick="switchLoginTab(0)" id="login-tab-0" class="flex-1 py-3 text-center border-b-2 border-sky-500 text-sky-400 font-medium">Student</button>
                    <button onclick="switchLoginTab(1)" id="login-tab-1" class="flex-1 py-3 text-center text-slate-400 hover:text-slate-200">Director</button>
                </div>

                <!-- Student Login -->
                <div id="student-login-form">
                    <input id="login-student-id" type="text" maxlength="12" placeholder="12-digit Student ID" class="w-full bg-slate-900 border border-slate-700 rounded-2xl px-5 py-4 mb-6">
                    <button onclick="handleStudentLogin()" class="w-full bg-sky-500 hover:bg-sky-600 py-4 rounded-2xl text-white font-semibold">Login</button>
                </div>

                <!-- Director Login -->
                <div id="director-login-form" class="hidden">
                    <input id="director-name" placeholder="Full Name" class="w-full bg-slate-900 border border-slate-700 rounded-2xl px-5 py-4 mb-4">
                    <input id="director-email" type="email" placeholder="Email" class="w-full bg-slate-900 border border-slate-700 rounded-2xl px-5 py-4 mb-4">
                    <input id="director-phone" placeholder="+250..." class="w-full bg-slate-900 border border-slate-700 rounded-2xl px-5 py-4 mb-4">
                    <input id="director-password" type="password" placeholder="Password" class="w-full bg-slate-900 border border-slate-700 rounded-2xl px-5 py-4 mb-6">
                    <button onclick="registerOrLoginDirector()" class="w-full bg-emerald-500 hover:bg-emerald-600 py-4 rounded-2xl text-white font-semibold">Register / Login</button>
                </div>

                <div class="text-center mt-6 text-xs text-slate-400">
                    New student? <button onclick="showRegisterModal()" class="text-sky-400 underline">Create Account</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Registration Modal and Main App sections follow the same structure as before -->
    <script src="script.js"></script>
</body>
</html>
